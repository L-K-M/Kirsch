name: Kirsch checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: kirsch-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run benchmark tests
        run: python3 -m unittest discover -s benchmark/tests -v
      - name: Validate checked fixture
        run: python3 benchmark/tools/kirsch_benchmark.py validate benchmark/tests/fixtures/development/manifest.json

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/actions/wrapper-validation@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-35 build-tools;35.0.0
      - uses: gradle/actions/setup-gradle@v5
      - name: Test, assemble, and lint
        run: ./gradlew testDebugUnitTest assembleDebug lintDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: kirsch-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
